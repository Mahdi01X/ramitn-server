name: rami_tunisien
description: Rami Tunisien - Cross-platform card game
publish_to: 'none'
version: 1.0.0+9

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  go_router: ^14.0.0
  socket_io_client: ^2.0.3
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  uuid: ^4.3.0
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0
  shared_preferences: ^2.2.0
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "unnamed.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "unnamed.jpg"
  adaptive_icon_padding: 0

flutter:
  uses-material-design: true
  assets:
    - unnamed.jpg
    - assets/yasmina.mp3
    - assets/1772912871079.webp










